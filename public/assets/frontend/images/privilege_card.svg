<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 265" width="420" height="265">
  <defs>
    <!-- Card Background Gradient -->
    <linearGradient id="bgGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f1a18" />
      <stop offset="100%" stop-color="#0d0a08" />
    </linearGradient>
    
    <!-- Ambient Orange Glow -->
    <radialGradient id="glowOrange1" cx="80%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#fbb03b" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#1f1a18" stop-opacity="0" />
    </radialGradient>
    
    <!-- Ambient Red Glow -->
    <radialGradient id="glowRed1" cx="20%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#c1272d" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#0d0a08" stop-opacity="0" />
    </radialGradient>

    <!-- Metallic Gold Chip -->
    <linearGradient id="chipGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e6c27a" />
      <stop offset="100%" stop-color="#b8860b" />
    </linearGradient>
  </defs>

  <!-- Card Base -->
  <rect width="420" height="265" rx="20" fill="url(#bgGrad1)" stroke="#f15a24" stroke-width="1" stroke-opacity="0.4"/>
  <rect width="420" height="265" rx="20" fill="url(#glowOrange1)" />
  <rect width="420" height="265" rx="20" fill="url(#glowRed1)" />

  <!-- Brand Name -->
  <text x="30" y="55" fill="#fbb03b" font-family="sans-serif" font-size="22" font-weight="bold" letter-spacing="1">DEGCHI DINE</text>
  
  <!-- Tier Badge -->
  <text x="300" y="50" fill="#f15a24" font-family="sans-serif" font-size="14" font-weight="bold" letter-spacing="2">PRIVILEGE</text>

  <!-- EMV Smart Chip -->
  <rect x="30" y="105" width="45" height="35" rx="6" fill="url(#chipGrad1)" />
  <line x1="30" y1="117" x2="75" y2="117" stroke="#8a6100" stroke-width="1" />
  <line x1="30" y1="128" x2="75" y2="128" stroke="#8a6100" stroke-width="1" />
  <line x1="45" y1="105" x2="45" y2="140" stroke="#8a6100" stroke-width="1" />
  <line x1="60" y1="105" x2="60" y2="140" stroke="#8a6100" stroke-width="1" />

  <!-- NFC Icon -->
  <path d="M 90 120 Q 95 110 100 120" fill="none" stroke="#a89f99" stroke-width="2" stroke-linecap="round"/>
  <path d="M 86 115 Q 95 102 104 115" fill="none" stroke="#a89f99" stroke-width="2" stroke-linecap="round"/>
  <path d="M 82 110 Q 95 94 108 110" fill="none" stroke="#a89f99" stroke-width="2" stroke-linecap="round"/>

  <!-- Card Number -->
  <text x="30" y="185" fill="#ffffff" font-family="monospace" font-size="24" letter-spacing="5">4123 8901 2345 6789</text>

  <!-- Cardholder Info -->
  <text x="30" y="225" fill="#a89f99" font-family="sans-serif" font-size="10" letter-spacing="1" text-transform="uppercase">Member Name</text>
  <text x="30" y="245" fill="#ffffff" font-family="sans-serif" font-size="15" letter-spacing="2" text-transform="uppercase">SONIA CHOUDHURY</text>

  <!-- Expiry Info -->
  <text x="335" y="225" fill="#a89f99" font-family="sans-serif" font-size="10" letter-spacing="1" text-transform="uppercase">Valid Thru</text>
  <text x="335" y="245" fill="#ffffff" font-family="sans-serif" font-size="15" letter-spacing="1">08/29</text>
</svg>
